apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "worker.fullname" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "worker.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "worker.labels" . | nindent 8 }}
        app.kubernetes.io/component: consumer
    spec:
      serviceAccountName: {{ include "worker.serviceAccountName" . }}
{{- with .Values.worker.podSecurityContext }}
      securityContext:
{{- toYaml . | nindent 8 }}
{{- end }}
      initContainers:
        - name: queue-dir-init
          image: {{ .Values.worker.queueInitImage | quote }}
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - mkdir -p /queue/messages /queue/processed && chown -R 1000:1000 /queue
          volumeMounts:
            - name: queue
              mountPath: /queue
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: SERVICE_NAME
              value: {{ include "worker.name" . | quote }}
            - name: APP_ENV
              value: {{ default .Release.Namespace .Values.worker.appEnv | quote }}
            - name: QUEUE_DIR
              value: "/queue"
            - name: WORKER_MODE
              value: "consume"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "worker.fullname" . }}-config
                  key: LOG_LEVEL
            - name: APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "worker.fullname" . }}-secret
                  key: APP_TOKEN
            - name: POLL_SECONDS
              value: "0.5"
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -d /queue/messages"]
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -d /queue/processed"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
{{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
{{- toYaml .Values.worker.securityContext | nindent 12 }}
          volumeMounts:
            - name: queue
              mountPath: /queue
      volumes:
        - name: queue
          hostPath:
            path: {{ .Values.worker.queue.hostPath | quote }}
            type: DirectoryOrCreate

