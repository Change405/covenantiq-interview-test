{{- if .Values.worker.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "worker.serviceAccountName" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
{{- end }}

{{- if .Values.worker.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "worker.fullname" . }}-role
  labels:
    {{- include "worker.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "worker.fullname" . }}-rolebinding
  labels:
    {{- include "worker.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "worker.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "worker.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}

