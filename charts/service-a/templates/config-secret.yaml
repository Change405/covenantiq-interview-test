apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-a.fullname" . }}-config
  labels:
    {{- include "service-a.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.serviceA.config.logLevel | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "service-a.fullname" . }}-secret
  labels:
    {{- include "service-a.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_TOKEN: {{ .Values.serviceA.secret.appToken | quote }}

