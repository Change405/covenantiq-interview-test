{{- if .Values.serviceA.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "service-a.serviceAccountName" . }}
  labels:
    {{- include "service-a.labels" . | nindent 4 }}
{{- end }}

{{- if .Values.serviceA.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "service-a.fullname" . }}-role
  labels:
    {{- include "service-a.labels" . | nindent 4 }}
rules:
  # TODO(candidate): add least-privilege rules if the service calls the Kubernetes API.
  # If the service does not need Kubernetes API access, set `.Values.serviceA.rbac.enabled=false`
  # and document the decision in your submission.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "service-a.fullname" . }}-rolebinding
  labels:
    {{- include "service-a.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "service-a.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "service-a.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}

