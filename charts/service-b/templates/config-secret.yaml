apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-b.fullname" . }}-config
  labels:
    {{- include "service-b.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.serviceB.config.logLevel | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "service-b.fullname" . }}-secret
  labels:
    {{- include "service-b.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_TOKEN: {{ .Values.serviceB.secret.appToken | quote }}

